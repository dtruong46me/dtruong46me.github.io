<!DOCTYPE html>

<body>
    <div class="main">
        <!-- BEGIN: Header -->
        <div class="header" style="display: flex; justify-content: center; padding: 20px 0;">

                <div class="logo_img">
                    <img src="../assets/imgs/dtruong46me.png" alt="dtruong46me">

                <div class="navi">

                    <a href="#"><div>Project</div></a>
                    <a href="#"><div>Blog</div></a>
                    <a href="#"><div>Contact</div></a>
                </div>
            </div>
        </div>
        <!-- END: Header -->

        <!-- BEGIN: Body -->
        <div class="body">
            <div class="home">
                <div class="wrapper home_wrapper" style="padding: 12px 0 30px 0; display: flex; position: relative;">
                    <div class="dtruong_img">
                        <img src="../assets/imgs/dtruong.png" alt="">

                    <div class="decor" style="position: absolute; left: 408px; top: 112px;">
                        <!-- Dinh Truong -->
                        <div class="dtruong_text" style="position: relative; height: 171px; width: 1000px;">
                            <p class="back_text">Dinh Truong</p>
                            <p class="front_text">Phan Dinh Truong</p>
                        </div>

                        <!-- Download CV & Data Engineer -->
                        <div style="display: flex; margin-left: 148px; margin-top: 20px;">
                            <a href="#" class="download_cv">

                                    <i class="fa-solid fa-download" style="font-size: 24px;"></i>
                                </div>
                            </a>
                            <div class="my_job" style="display: flex; align-items: center; margin-left: 44px; padding-bottom: 32px;">
                                <div class="my_job_line" style="width: 82px; height: 3px; background-color: #fff; margin-right: 22px;"></div>
                                <p style="font-size: 32px; font-weight: 600; color: #fff;">Data Engineer</p>
                            </div>
                        </div>

                        <!-- Contact & dtruong46me -->
                        <div class="contact_me" style="display: flex;">
                            <a href="#" style="color: #69709e; text-decoration: none; display: flex; align-items: center;">
                                <div style="width: 28px; height: 28px; border-radius: 14px; border: 1px solid #69709e; display: flex; align-items: center; justify-content: center; margin-right: 10px;">
                                    <i class="fa-solid fa-phone"></i>
                                </div>
                                <span>(+84) 97 987 01 56</span>
                            </a>

                            <a href="#" style="color: #69709e; text-decoration: none; display: flex; align-items: center;">
                                <div style="width: 28px; height: 28px; border-radius: 14px; border: 1px solid #69709e; display: flex; align-items: center; justify-content: center; margin-right: 10px;">
                                    <i class="fa-regular fa-envelope"></i>
                                </div>
                                <span>dtruong46.me@gmail.com</span>
                            </a>

                            <a href="#" style="color: #69709e; text-decoration: none; display: flex; align-items: center;">
                                <div style="width: 28px; height: 28px; border-radius: 14px; border: 1px solid #69709e; display: flex; align-items: center; justify-content: center; margin-right: 10px;">
                                    <i class="fa-brands fa-facebook-f"></i>
                                </div>
                                <span>fb.com/dtruong46me</span>
                            </a>

            <div class="project"></div>
